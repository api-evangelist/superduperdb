aid: superduperdb
url: https://raw.githubusercontent.com/api-evangelist/superduperdb/refs/heads/main/apis.yml
name: Superduper
kind: company
description: >-
  Superduper (formerly SuperDuperDB) is an open-source Python framework for
  building database-integrated AI agents and applications directly on top of
  existing databases - MongoDB, SQL databases, Snowflake, and Redis - without
  separate vector stores or ETL. It supports semantic / vector search, RAG,
  transformer and PyTorch model integration, LLM serving, and distributed ML
  workflows. The commercial side, Superduper Agents, is an enterprise AI agent
  orchestration platform for BI and data operations, distributed via the
  Snowflake Marketplace and self-hosted enterprise installs.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - AI Framework
  - Vector Search
  - RAG
